name: sennia-linux
description: uBlue imaged tweaked by PolyCat with nvidia drivers

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 43

modules:
  
  - type: os-release
    properties:
      NAME: Sennia
      PRETTY_NAME: Sennia Linux
      HOME_URL: https://github.com/PolyCatDev/sennia-linux
      DEFAULT_HOSTNAME: sennia

  - type: script
    scripts:
      - remove-default-backgrounds.sh

  - type: gschema-overrides
  - type: gnome-extensions
    install:
      - 9164 # Status Tray
      - 517 # Caffeine
      - 3193 # Blur my Shell

  - type: brew
    brew-analytics: false
    auto-update: false
    auto-upgrade: false
    nofile-limits: false

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: user
        install:
          - org.gnome.Loupe
          - io.github.celluloid_player.Celluloid
          - com.mattjakeman.ExtensionManager
          - org.gnome.Calendar
          - com.github.tchx84.Flatseal
          - it.mijorus.gearlever
          - io.missioncenter.MissionCenter
          - org.gnome.Papers

  - from-file: system-packages.yml

  - type: files
    files:
      - source: system
        destination: /
  - type: initramfs

  - type: signing # this sets up the proper policy & signing files for signed images to work fully
