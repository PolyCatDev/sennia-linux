# This file manages all that has to do with system packages and modules

modules:

  - type: bling
    install:
      - rpmfusion

  - type: akmods
    base: main
    install:
      - v4l2loopback

    nvidia-driver: nvidia-open

  - type: dnf
    repos:
      cleanup: true
      files:
        - https://download.docker.com/linux/fedora/docker-ce.repo
      copr:
        - pgdev/ghostty
    install:
      packages:
        - gnome-tweaks
        - stow
        - ghostty
        - btop
        - ripgrep
        - fuse-sshfs
        - steam
        - mangohud

        # Dev Tools
        - neovim
        - clang
        - make
        - python3-devel
        - android-tools
        - git-lfs

        # Container Tools
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-compose-plugin

        # Themes
        - adw-gtk3-theme

        # Deps
        - nautilus-python

    remove:
      auto-remove: true
      packages:
        - firefox
        - firefox-langpacks
        - gnome-shell-extension-background-logo
        - gnome-shell-extension-apps-menu
        - gnome-shell-extension-launch-new-instance
        - gnome-shell-extension-window-list
        - gnome-shell-extension-places-menu
        - ptyxis
        - nvtop
        - gnome-system-monitor
        - gnome-tour
        - dconf-editor
        - htop
        - gnome-extensions-app

  - type: script
    snippets:
      - "sed -i 's/^Terminal=true/Terminal=false/' /usr/share/applications/nvim.desktop"
      - "sed -i 's|^Exec=.*|Exec=/usr/bin/ghostty -e nvim %F|' /usr/share/applications/nvim.desktop"

  - type: systemd
    system:
      enabled:
        - docker.service
        - containerd.service
        - podman.service
      disabled:
        - flatpak-system-update.timer
        - rpm-ostreed-automatic.timer
        - NetworkManager-wait-online.service

    user:
      disabled:
        - flatpak-user-update.timer
